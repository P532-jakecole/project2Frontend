<script>
  let host = "https://project2part2.onrender.com";
  let department = "lab";
  let employeeId = "1";
  let user = department + employeeId;
  let queue = new Map();
  let claimed = new Map();
  let userBadge = new Map();
  let last = ["","","",""];

  // Loads any existing History data
  async function loadQueue() {
    let response = await fetch(host + "/home");
    let data = await response.json();

    const tableBody = document.querySelector("#queueTable tbody");

    tableBody.innerHTML = "";

    data.forEach(order => {
      const row = document.createElement("tr");
      let orderId = order.orderID;
      row.innerHTML = `
            <td>${order.type}</td>
            <td>${order.patientName}</td>
            <td>${order.clinicianName}</td>
            <td>${order.priority}</td>
            <td>${order.status}</td>
            <td> <button onclick="cancel(${orderId})">Cancel</button> </td>
        `;

      tableBody.appendChild(row);

      queue.set(order.orderID.toString(), order);
    });

    await loadClaimed();
  }

  async function loadNotifications() {
    try {
      let response = await fetch(host + "/home/notification");
      let notifications = await response.json();

      dashboardShown = notifications.includes("AlertNotification");
      if (dashboardShown){
        console.log(userBadge);
        if(userBadge.get(user) == null || isNaN(userBadge.get(user))){
          userBadge.set(user, 0);
        }
        document.getElementById("badge").style.display = "inline";

        document.getElementById("badge").innerText = "Badge Number: " + userBadge.get(user);
      }else{
        document.getElementById("badge").style.display = "none";
      }

      document.querySelectorAll("input[type=checkbox]").forEach(box => box.checked = false);

      notifications.forEach(noti => {
        let checkbox = document.getElementById(noti.toLowerCase());
        if (checkbox) {
          checkbox.checked = true;
        }
      });


    } catch (error) {
      console.error("Error loading notifications:", error);
    }
  }

  async function loadLog() {
    let response = await fetch(host + "/home/log");
    let data = await response.json();

    const tableBody = document.querySelector("#logTable tbody");

    tableBody.innerHTML = "";

    data.forEach(order => {
      const row = document.createElement("tr");
      if(order.length === 4){
        if(order[1] != "undo"){
          row.innerHTML = `
                        <td>${order[0]}</td>
                        <td>${order[1]}</td>
                        <td>${order[2]}</td>
                        <td>${order[3]}</td>
                        <td>N/A</td>
                        <td>N/A</td>
                        <td><button onclick="replayCommand('${order[1]}', '${order[2]}')">Replay Command</button></td>
                    `;
        }else{
          row.innerHTML = `
                        <td>${order[0]}</td>
                        <td>${order[1]}</td>
                        <td>${order[2]}</td>
                        <td>${order[3]}</td>
                        <td>N/A</td>
                        <td>N/A</td>
                    `;
        }
      }else{
        if(order[1] != "undo"){
          row.innerHTML = `
                        <td>${order[0]}</td>
                        <td>${order[1]}</td>
                        <td>${order[2]}</td>
                        <td>${order[3]}</td>
                        <td>${order[4]}</td>
                        <td>${order[5]}</td>
                        <td><button onclick="replayCommand('${order[1]}', '${order[2]}')">Replay Command</button></td>
                    `;
        }else{
          row.innerHTML = `
                        <td>${order[0]}</td>
                        <td>${order[1]}</td>
                        <td>${order[2]}</td>
                        <td>${order[3]}</td>
                        <td>${order[4]}</td>
                        <td>${order[5]}</td>
                    `;
        }
      }

      tableBody.appendChild(row);
    });

  }

  async function loadClaimed() {
    const tableBody = document.querySelector("#claimedTable tbody");
    tableBody.innerHTML = "";

    let data = claimed.get(user);
    if (data == null){
      return;
    }
    data.forEach(order => {
      const row = document.createElement("tr");
      row.innerHTML = `
            <td>${order[0]}</td>
            <td>${order[1]}</td>
            <td><button onclick="completeOrder(${order[0]}, '${order[1]}')">Complete Order</button></td>
        `;

      tableBody.appendChild(row);
    });

  }

  loadQueue();
  loadLog();
  loadNotifications();
</script>

<script>
  let stompClient = null;

  function connect() {
    const socket = new SockJS(host + '/ws');
    stompClient = Stomp.over(socket);

    stompClient.connect({}, function(frame) {
      console.log("Connected: " + frame);
      subscribeNotify();
      loadTimer();
    });
  }

  function subscribeNotify(){
    stompClient.subscribe("/order/logs", function(message){
      let text = message.body;
      console.log(text);
    });

    stompClient.subscribe("/order/alert", function(message){
      let text = message.body;

      let badge = document.getElementById("badge");

      badge.style.display = "inline";
      badge.innerText = "Badge Number: " + text;
    });
  }

  function loadTimer(){
    queueInterval = setInterval(loadQueue, 3000);
    commandInterval = setInterval(loadLog, 3000);
  }

  connect();
</script>

<script>

  async function undo(){
    let request = {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: user
    };

    let response = await fetch(host + "/home/undo", request);
    if (response.ok) {
      switch (last[0]){
        case "claim":
          const arr = claimed.get(last[3]);
          const index = arr.findIndex(order =>
                  order[0] === last[1] &&
                  order[1] === last[2]
          );
          if (index !== -1) {
            arr.splice(index, 1);
          }
          userBadge.set(last[3], userBadge.get(last[3]) + 1);
          last = ["cancel", last[1], last[2], user];
          break;
        case "complete":
          if (claimed.get(last[3]) == null) {
            claimed.set(last[3], new Array([parseInt(last[1].toString()), last[2]]));
          } else {
            claimed.get(last[3]).push([parseInt(last[1].toString()), last[2]]);
          }
          last = ["claim", last[1], last[2], user];
          break;
      }

    }
  }

  async function replayCommand(type, orderId){
    let command = [orderId, type, user];
    let request = {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify(command)
    };

    let response = await fetch(host + "/home/replay", request);
    if (response.ok) {
      let data = queue.get(orderId);
      let priority = data.priority;
      last = [type, orderId ,priority, user];
      if(type === "claim") {
        console.log(orderId);
        console.log(queue);
        console.log(data);
        if (claimed.get(user) == null) {
          claimed.set(user, new Array([parseInt(orderId.toString()), priority]));
        } else {
          claimed.get(user).push([parseInt(orderId.toString()), priority]);
        }
      }else if(type === "complete"){
        const arr = claimed.get(user);
        const index = arr.findIndex(order =>
                order[0] === orderId &&
                order[1] === priority
        );
        if (index !== -1) {
          arr.splice(index, 1);
        }
        userBadge.set(user, userBadge.get(user) + 1);
      }

      console.log(claimed);
    }
  }

  async function setTriage() {

    let triage = document.getElementById("triage").value;

    let request = {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: triage
    };

    let response = await fetch(host + "/home/triage", request);

    let message;

    if (response.ok) {
      message = "Triage Strategy changed";
      alert(message);
    }
  }

  async function setNotifications(){
    const checkedValues = [...document.querySelectorAll('input[type="checkbox"]:checked')]
            .map(cb => cb.value);

    const notifications = [user, ...checkedValues];

    let request = {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify(notifications)
    };
    await fetch(host + "/home/notification", request);
    await loadNotifications();
  }

  async function setDepartment(){
    department = document.getElementById("department").value;
    console.log("Department Changed");
    user = department + employeeId;

    let order = [department, employeeId];

    let request = {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify(order)
    };
    await fetch(host + "/home/update/user", request);
    await loadNotifications();
  }

  async function setEmployeeId(){
    employeeId = document.getElementById("employeeId").value;
    console.log("Employee Id Changed");
    user = department + employeeId;

    let order = [department, employeeId];

    let request = {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify(order)
    };
    await fetch(host + "/home/update/user", request);
    await loadNotifications();
  }

  async function claimOrder(){
    let response = await fetch(host + "/home/order");
    let data;
    try{
      data = await response.json();
    }catch(e){
      return;
    }

    let orderId = data.orderID;
    let priority = data.priority;
    if (claimed.get(user) == null){
      claimed.set(user, new Array([orderId, priority]));
    }else{
      claimed.get(user).push([orderId, priority]);
    }

    let order = [orderId, user]

    let request = {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify(order)
    };
    await fetch(host + "/home/claim", request);
    last = ["claim", orderId, priority, user];
    userBadge.set(user, userBadge.get(user) + 1);
  }

  async function completeOrder(orderId, priority){
    // let orderArray = claimed.get(user);
    // if(orderArray == null){
    //     console.log("No Order Claimed");
    //     return;
    // }
    //
    // let orderId = orderArray.get(user);
    // if(orderId == null){
    //     console.log("No Order Claimed");
    //     return;
    // }
    console.log(claimed);

    let order = [orderId, user];

    let request = {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify(order)
    };
    let response = await fetch(host + "/home/complete", request);
    if (response.ok){
      const arr = claimed.get(user);
      const index = arr.findIndex(order =>
              order[0] === orderId &&
              order[1] === priority
      );
      if (index !== -1) {
        arr.splice(index, 1);
      }
      userBadge.set(user, userBadge.get(user) + 1);
      last = ["complete", orderId, priority, user];
    }
  }

  async function cancel(orderId){
    let order = [orderId, user]

    let request = {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify(order)
    };
    await fetch(host + "/home/cancel", request);
    last = ["cancel", orderId, "", user];
    userBadge.set(user, userBadge.get(user) + 1);
  }

  async function submitOrder() {

    let type = document.getElementById("type").value;
    if(type.trim() === ""){
      console.log("Type is Required for order to be created")
      return
    }

    let patient = document.getElementById("patient").value;
    if(patient.trim() === ""){
      console.log("Patient is Required for order to be created")
      return
    }
    let clinician = document.getElementById("clinician").value;
    if(clinician.trim() === ""){
      console.log("Clinician is Required for order to be created")
      return
    }
    let description = document.getElementById("description").value;
    if(description.trim() === ""){
      console.log("Description is Required for order to be created")
      return
    }
    let priority = document.getElementById("priority").value;
    if(priority.trim() === ""){
      console.log("Priority is Required for order to be created")
      return
    }


    let order = [type, patient, clinician, description, priority];

    let request = {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify(order)
    };
    await fetch(host + "/home", request);
    last = ["submit", "", ""];
    userBadge.set(user, userBadge.get(user) + 1);
  }
</script>
